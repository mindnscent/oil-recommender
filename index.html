<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mind n Scent | 에센셜 오일 추천</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --sage-50:#F4F7F2;--sage-100:#E8EDE4;--sage-200:#D4DED0;--sage-300:#B0C4A8;
  --sage-400:#8FA888;--sage-500:#6B7F6B;--sage-600:#556B55;--sage-700:#4A5C4A;
  --sage-800:#3A4A3A;--sage-900:#2A362A;
  --bg:#FAFCF8;--chat-bg:#F0F4ED;--white:#FFFFFF;
  --shadow-sm:0 2px 8px rgba(74,92,74,0.06);
  --shadow-md:0 4px 16px rgba(74,92,74,0.1);
  --shadow-lg:0 8px 32px rgba(74,92,74,0.12);
  --radius:20px;--radius-sm:14px;--radius-xs:8px;
  --transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans KR',-apple-system,sans-serif;
  background:var(--bg);color:var(--sage-800);
  line-height:1.7;-webkit-font-smoothing:antialiased;
  overflow:hidden;height:100vh;height:100dvh;
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--sage-300);border-radius:2px;}

/* === APP SHELL === */
.app{
  max-width:580px;margin:0 auto;height:100vh;height:100dvh;
  display:flex;flex-direction:column;background:var(--white);
  box-shadow:var(--shadow-lg);overflow:hidden;
}

/* === HEADER === */
.app-header{
  padding:12px 20px 8px;
  background:linear-gradient(180deg,var(--sage-50) 0%,var(--white) 100%);
  border-bottom:1px solid var(--sage-100);
  text-align:center;flex-shrink:0;
  position:relative;z-index:10;
}
.logo-img{height:44px;width:auto;display:block;margin:0 auto 6px;mix-blend-mode:multiply;}
.nav-tabs{display:flex;gap:4px;background:var(--sage-100);border-radius:10px;padding:3px;}
.nav-tab{
  flex:1;padding:8px 0;border:none;border-radius:8px;
  background:transparent;color:var(--sage-500);
  font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;font-weight:500;
  cursor:pointer;transition:var(--transition);
}
.nav-tab:hover{color:var(--sage-700);}
.nav-tab.active{background:var(--white);color:var(--sage-700);box-shadow:var(--shadow-sm);}

/* === MAIN CONTENT === */
.main-content{flex:1;overflow:hidden;}

/* === PAGES (show/hide) === */
.page-container{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.app-page{display:none;flex:1;overflow-y:auto;overflow-x:hidden;}
.app-page.visible{display:flex;flex-direction:column;}

/* === PAGE 1: EMOTION SELECT === */
.emotion-page{
  display:flex;flex-direction:column;
  padding:0;
}
.emotion-page-header{
  padding:16px 24px 10px;text-align:center;flex-shrink:0;
}
.emotion-page-title{
  font-family:'Noto Sans KR',sans-serif;
  font-size:1.05rem;font-weight:600;color:var(--sage-700);
  margin-bottom:6px;letter-spacing:-0.5px;
}
.emotion-page-sub{font-size:0.85rem;color:var(--sage-400);font-weight:300;}

.emotion-grid{
  flex:1;overflow-y:auto;padding:0 16px 24px;
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  align-content:start;
}
.emotion-card{
  background:var(--white);border:1.5px solid var(--sage-100);
  border-radius:var(--radius);padding:20px 14px;
  text-align:center;cursor:pointer;transition:var(--transition);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  position:relative;overflow:hidden;
}
.emotion-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--sage-300),var(--sage-500));
  transform:scaleX(0);transition:transform 0.3s ease;
}
.emotion-card:hover{
  border-color:var(--sage-300);box-shadow:var(--shadow-md);
  transform:translateY(-2px);
}
.emotion-card:hover::after{transform:scaleX(1);}
.emotion-card:active{transform:scale(0.97);}
.emotion-card-emoji{font-size:2rem;}
.emotion-card-label{font-size:0.88rem;font-weight:500;color:var(--sage-700);}
.emotion-card-sub{font-size:0.72rem;font-weight:300;color:var(--sage-400);line-height:1.4;}

/* === BIG CATEGORY PAGE === */
.big-cat-page{padding:0;}
.big-cat-grid{
  flex:1;overflow-y:auto;padding:0 24px 16px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  align-content:start;
}
.big-cat-card{
  background:linear-gradient(145deg,var(--sage-50),var(--sage-100));
  border:1.5px solid var(--sage-200);border-radius:var(--radius);
  padding:14px 10px;text-align:center;cursor:pointer;transition:var(--transition);
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;min-height:80px;
}
.big-cat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--sage-300),var(--sage-500));
  transform:scaleX(0);transition:transform 0.3s ease;
}
.big-cat-card:hover{
  border-color:var(--sage-300);box-shadow:var(--shadow-md);transform:translateY(-2px);
}
.big-cat-card:hover::after{transform:scaleX(1);}
.big-cat-card:active{transform:scale(0.97);}
.big-cat-label{font-size:13px;font-weight:600;color:var(--sage-700);line-height:1.4;flex:1;display:flex;align-items:center;}
.big-cat-sub{font-family:'Cormorant Garamond',serif;font-size:0.7rem;color:var(--sage-500);font-style:normal;letter-spacing:0.5px;padding-bottom:2px;}

/* === SUB-EMOTION PAGE === */
.sub-emotion-area{flex:1;overflow-y:auto;padding:0 16px 24px;width:100%;box-sizing:border-box;}
.sub-emotion-prompt{
  text-align:center;padding:28px 16px 20px;font-size:0.9rem;
  color:var(--sage-500);font-weight:300;
}
.sub-emotion-area .oil-list{
  display:flex;flex-direction:column;gap:10px;width:100%;
}
.sub-emotion-area .oil-item{
  width:100%;box-sizing:border-box;
}

/* === PAGE 3: CHAT === */
.chat-top-bar{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-bottom:1px solid var(--sage-100);
  flex-shrink:0;background:var(--white);
}
.chat-back{
  background:none;border:none;cursor:pointer;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;color:var(--sage-600);transition:var(--transition);
}
.chat-back:hover{background:var(--sage-100);}
.chat-top-title{font-size:0.88rem;font-weight:500;color:var(--sage-700);}
.chat-top-dot{
  width:7px;height:7px;border-radius:50%;background:#7BC47F;
  margin-left:auto;flex-shrink:0;
}

.chat-area{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:10px;
}

/* Chat bubbles */
.chat-msg{max-width:88%;animation:msgIn 0.4s ease both;}
.chat-msg.bot{align-self:flex-start;}
.chat-msg.user{align-self:flex-end;}
.chat-bubble{
  padding:13px 17px;border-radius:var(--radius);
  font-size:0.88rem;line-height:1.75;font-weight:300;
}
.bot .chat-bubble{
  background:var(--chat-bg);color:var(--sage-800);
  border-bottom-left-radius:4px;
}
.user .chat-bubble{
  background:var(--sage-500);color:var(--white);
  border-bottom-right-radius:4px;
}
.bot-avatar{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.bot-avatar-icon{
  width:26px;height:26px;border-radius:50%;background:var(--sage-200);
  display:flex;align-items:center;justify-content:center;font-size:0.7rem;
}
.bot-avatar-name{font-size:0.75rem;font-weight:500;color:var(--sage-600);}

/* Follow-up options */
.follow-options{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.follow-btn{
  padding:12px 16px;background:var(--white);
  border:1.5px solid var(--sage-200);border-radius:var(--radius-sm);
  font-family:'Noto Sans KR',sans-serif;font-size:0.84rem;font-weight:400;
  color:var(--sage-700);cursor:pointer;transition:var(--transition);
  text-align:left;display:flex;align-items:center;gap:10px;
}
.follow-btn:hover{border-color:var(--sage-400);background:var(--sage-50);transform:translateX(4px);}
.follow-btn:active{transform:scale(0.98);}
.follow-btn-dot{
  width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,var(--sage-300),var(--sage-500));
  flex-shrink:0;
}

/* Oil card */
.oil-card-wrap{margin-top:8px;}
.oil-card{
  background:var(--white);border:1px solid var(--sage-200);
  border-radius:var(--radius);padding:22px;position:relative;overflow:hidden;
}
.oil-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--sage-300),var(--sage-500),var(--sage-300));
}
.oil-card-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.oil-card-icon{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,var(--sage-50),var(--sage-100));
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;flex-shrink:0;box-shadow:var(--shadow-sm);
}
.oil-card-name{font-size:1.08rem;font-weight:600;color:var(--sage-800);}
.oil-card-en{
  font-family:'Cormorant Garamond',serif;
  font-size:0.88rem;color:var(--sage-500);font-style:italic;
}
.oil-card-keyword{
  display:inline-block;
  background:linear-gradient(135deg,var(--sage-100),var(--sage-200));
  color:var(--sage-700);padding:4px 14px;border-radius:50px;
  font-size:0.73rem;font-weight:500;margin-bottom:14px;
}
.oil-card-divider{height:1px;background:var(--sage-100);margin:12px 0;}
.oil-card-label{
  font-size:0.67rem;font-weight:600;color:var(--sage-400);
  letter-spacing:1.5px;text-transform:uppercase;margin-top:12px;margin-bottom:5px;
}
.oil-card-text{font-size:0.84rem;color:var(--sage-700);font-weight:300;line-height:1.8;}
.oil-card-quote{
  margin-top:14px;padding:14px 16px;
  background:linear-gradient(135deg,var(--sage-50),#F0F4ED);
  border-radius:var(--radius-sm);border-left:3px solid var(--sage-400);
  font-size:0.86rem;color:var(--sage-600);font-weight:400;line-height:1.7;
}
.btn-buy{
  display:inline-flex;align-items:center;gap:6px;margin-top:16px;
  padding:11px 24px;background:var(--sage-600);color:var(--white);
  border:none;border-radius:50px;font-family:'Noto Sans KR',sans-serif;
  font-size:0.82rem;font-weight:400;cursor:pointer;transition:var(--transition);
  text-decoration:none;
}
.btn-buy:hover{background:var(--sage-700);transform:translateY(-1px);box-shadow:var(--shadow-md);}
.btn-buy svg{width:14px;height:14px;}

/* Chat bottom action */
.chat-bottom{
  padding:12px 16px;background:var(--white);
  border-top:1px solid var(--sage-100);flex-shrink:0;
}
.btn-restart{
  width:100%;padding:12px;background:var(--sage-50);
  border:1.5px solid var(--sage-200);border-radius:12px;
  color:var(--sage-600);font-family:'Noto Sans KR',sans-serif;
  font-size:0.84rem;cursor:pointer;transition:var(--transition);
}
.btn-restart:hover{background:var(--sage-100);border-color:var(--sage-300);}

/* === GALLERY === */
.section{display:none;flex:1;flex-direction:column;overflow:hidden;}
.section.active{display:flex;}
.gallery-area{flex:1;overflow-y:auto;padding:16px;}
.search-box{position:relative;margin-bottom:12px;}
.search-box input{
  width:100%;padding:12px 16px 12px 40px;
  border:1.5px solid var(--sage-200);border-radius:12px;
  background:var(--sage-50);font-family:'Noto Sans KR',sans-serif;
  font-size:0.88rem;color:var(--sage-800);outline:none;transition:var(--transition);
}
.search-box input:focus{border-color:var(--sage-400);background:var(--white);}
.search-box input::placeholder{color:var(--sage-400);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--sage-400);}
.cat-scroll{
  display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px;
  -ms-overflow-style:none;scrollbar-width:none;flex-shrink:0;
}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-chip{
  white-space:nowrap;padding:6px 14px;border:1px solid var(--sage-200);
  border-radius:50px;background:var(--white);color:var(--sage-500);
  font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;
  cursor:pointer;transition:var(--transition);flex-shrink:0;
}
.cat-chip:hover{border-color:var(--sage-400);}
.cat-chip.active{background:var(--sage-600);color:var(--white);border-color:var(--sage-600);}
.companion-wrap{margin-top:4px;}
.companion-title{font-size:0.82rem;font-weight:600;color:var(--sage-600);margin-bottom:8px;}
.companion-cards{display:flex;flex-direction:column;gap:8px;}
.companion-card{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--sage-50);border:1px solid var(--sage-200);border-radius:var(--radius-sm);
  cursor:pointer;transition:var(--transition);
}
.companion-card:hover{border-color:var(--sage-400);box-shadow:var(--shadow-sm);}
.companion-icon{font-size:1.2rem;flex-shrink:0;}
.companion-info{flex:1;min-width:0;}
.companion-name{font-size:0.88rem;font-weight:600;color:var(--sage-700);}
.companion-en{font-size:0.72rem;color:var(--sage-400);font-family:'Cormorant Garamond',serif;font-style:italic;}
.companion-keyword{font-size:0.72rem;color:var(--sage-500);margin-top:2px;}
.oil-list{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.oil-item{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  background:var(--white);border:1px solid var(--sage-100);
  border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);
}
.oil-item:hover{border-color:var(--sage-300);box-shadow:var(--shadow-sm);transform:translateY(-1px);}
.oil-item-icon{
  width:40px;height:40px;border-radius:10px;background:var(--sage-100);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;
}
.oil-item-info{flex:1;min-width:0;}
.oil-item-name{font-size:0.92rem;font-weight:500;color:var(--sage-800);}
.oil-item-en{font-family:'Cormorant Garamond',serif;font-size:0.8rem;color:var(--sage-500);font-style:italic;}
.oil-item-keyword{
  display:inline-block;background:var(--sage-50);color:var(--sage-600);
  padding:2px 8px;border-radius:50px;font-size:0.7rem;font-weight:500;margin-top:4px;
}
.oil-item-arrow{color:var(--sage-300);flex-shrink:0;}
.no-results{text-align:center;padding:40px 20px;color:var(--sage-400);font-size:0.9rem;}

/* === MODAL === */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(42,54,42,0.5);backdrop-filter:blur(4px);
  z-index:1000;justify-content:center;align-items:flex-end;
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--white);border-radius:var(--radius) var(--radius) 0 0;
  max-width:580px;width:100%;max-height:85vh;overflow-y:auto;
  padding:32px 24px 40px;position:relative;animation:slideUp 0.35s ease;
}
.modal-handle{width:36px;height:4px;background:var(--sage-200);border-radius:2px;margin:0 auto 20px;}
.modal-close{
  position:absolute;top:16px;right:16px;background:var(--sage-100);
  border:none;width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--sage-500);font-size:1.2rem;cursor:pointer;transition:var(--transition);
}
.modal-close:hover{background:var(--sage-200);}

/* === FOOTER === */
.app-footer{
  padding:14px;text-align:center;border-top:1px solid var(--sage-100);
  background:var(--white);flex-shrink:0;
}
.footer-brand{
  font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;font-weight:700;
  color:var(--sage-500);letter-spacing:3px;text-transform:uppercase;
}
.footer-sub{font-size:0.65rem;color:var(--sage-400);margin-top:1px;font-weight:300;}

/* ANIMATIONS */
@keyframes msgIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.typing-dots{display:inline-flex;gap:4px;padding:4px 0;}
.typing-dots span{
  width:6px;height:6px;background:var(--sage-400);
  border-radius:50%;animation:dotPulse 1.4s ease infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dotPulse{
  0%,80%,100%{opacity:0.3;transform:scale(0.8);}
  40%{opacity:1;transform:scale(1);}
}

@media(max-width:580px){.app{box-shadow:none;}}
.desktop-widget .logo-img{display:none;}
.desktop-widget .app-header{padding:14px 20px 8px;}
.desktop-widget .big-cat-grid{padding:0 48px 6px;row-gap:6px;column-gap:20px;}
.desktop-widget .big-cat-card{padding:8px 6px;min-height:68px;}
.desktop-widget .big-cat-label{font-size:11.5px;line-height:1.3;}
.desktop-widget .emotion-page-header{padding:10px 24px 6px;}
.desktop-widget .cat-scroll{display:none;}
</style>
</head>
<body>

<div class="app">
  <header class="app-header">
    <img id="logoImg" alt="Mind N Scent" class="logo-img">
    <nav class="nav-tabs">
      <button class="nav-tab active" data-tab="recommend">오늘의 추천</button>
      <button class="nav-tab" data-tab="gallery">오일 갤러리</button>
    </nav>
  </header>

  <!-- RECOMMEND -->
  <section id="recommend" class="section active">
    <div class="page-container">
      <!-- PAGE 1: Big Category -->
      <div class="app-page visible" id="page0">
        <div class="emotion-page-header">
          <div class="emotion-page-sub">향기로 마음을 돌보는 시간</div>
          <div class="emotion-page-title">나의 마음에 귀 기울여볼까요?</div>
        </div>
        <div class="big-cat-grid" id="bigCatGrid"></div>
      </div>
      <!-- PAGE 2: Chat -->
      <div class="app-page" id="page1">
        <div class="chat-top-bar">
          <button class="chat-back" onclick="goToPage(0)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <span class="chat-top-title" style="font-weight:700;letter-spacing:2px;text-transform:uppercase;font-size:0.78rem;">MIND N SCENT</span>
          <span class="chat-top-dot"></span>
        </div>
        <div class="chat-area" id="chatArea"></div>
        <div class="chat-bottom" id="chatBottom" style="display:none;">
          <button class="btn-restart" onclick="goToPage(0)">처음으로 돌아가기</button>
        </div>
      </div>
    </div>
  </section>

  <!-- GALLERY -->
  <section id="gallery" class="section">
    <div class="gallery-area">
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="오일 이름, 키워드로 검색..." oninput="filterGallery()">
      </div>
      <div class="cat-scroll" id="catScroll"></div>
      <div class="oil-list" id="oilList"></div>
      <div class="no-results" id="noResults" style="display:none;">검색 결과가 없습니다</div>
    </div>
  </section>

  <footer class="app-footer">
    <div class="footer-brand">MIND N SCENT</div>
    <div class="footer-sub">&copy; 2026 All rights reserved</div>
  </footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

const oils=[{id:1,name:"그레이프프룻",en:"Grapefruit",cat:"CITRUS",icon:"🍊",keyword:"활력, 상큼함",target:"요즘 일어나는 모든 일이 부정적으로만 느껴지고, 기대가 무너질 때마다 실망과 좌절이 반복되고 있지 않으신가요?",energy:"부정적인 감정을 털어내고 삶의 긍정적인 에너지를 다시 깨워주는 정화의 에너지",story:"부정적인 생각은 상황을 더 나쁘게 만들 뿐이에요. 그 생각을 바꿀 수 있는 사람은 오직 나 자신뿐이에요. 자신의 감정을 보듬고 보살피며 삶의 긍정적인 부분에 집중해 보세요. 부정적인 생각을 긍정적으로 바꾸는 훈련을 꾸준히 하다 보면 어느새 많은 상황이 긍정적으로 변해가는 것을 느낄 수 있어요.",oneline:"나를 둘러싼 부정적 감정을 털어내고 삶의 긍정적인 부분에 집중하세요!"},{id:2,name:"네롤리",en:"Neroli",cat:"FLOWERS",icon:"🌸",keyword:"밝음, 편안함",target:"실패할까 봐 두려워서 선택을 미루고 계신 건 아닌가요? 완벽한 때를 기다리다가 정작 원하는 것을 놓치고 있지 않으신가요?",energy:"불안감을 잠재우고 그럼에도 불구하고 선택하고 행동할 수 있도록 이끌어주는 에너지",story:"완벽한 때는 결코 오지 않아요. 선택에는 늘 불안함이 따르기 마련이에요. 중요한 건 그 불안함에도 불구하고 선택하고 행동하는 것이에요. 지금 이 순간 주어진 것에 의지해 선택하고 나아가세요. 선택 후의 책임을 기꺼이 받아들일 때 비로소 내 삶의 주인공이 될 수 있어요.",oneline:"불안해도 괜찮아요. 그럼에도 불구하고 선택하고 나아가는 것, 그게 진짜 용기예요!"},{id:3,name:"넛맥",en:"Nutmeg",cat:"NUTS",icon:"🥜",keyword:"따뜻함, 자극",target:"모든 것에 의욕이 사라지고 삶 전체가 무기력하게 느껴지고 있지 않으신가요?",energy:"식어버린 열정에 다시 불을 지펴 내 안의 살아있는 에너지를 깨워주는 에너지",story:"모든 것에 열정과 의지가 사라진 것 같아도 내 안 어딘가에서는 여전히 변화를 원하고 있어요. 어떤 도움이라도 기꺼이 수용하면서 새로운 희망을 끌어올려보세요. 작은 시작 하나가 내 삶에 많은 변화를 만들어낼 수 있어요.",oneline:"잠시 꺼져버린 내 안의 뜨거운 열정을 다시금 타오르게 만들어 살아있음을 느껴보세요!"},{id:4,name:"라벤더",en:"Lavender",cat:"FLOWERS",icon:"🌸",keyword:"진정, 안정",target:"혼자서 쉬고 싶다는 생각을 하면서도 정작 그런 시간을 갖지 못하고 있지 않으신가요?",energy:"지쳐있는 마음에 온기를 주어 스스로를 돌볼 수 있도록 도와주는 위로의 에너지",story:"우리는 기계가 아니에요. 쉬어야 하고 혼자만의 시간이 꼭 필요해요. 시간이 없다면 화장실에 앉아있는 순간만이라도 오롯이 편안하게 호흡하면서 쉬어보세요. 주춤거리게 만드는 것들에서 잠시 떨어져 나만의 든든한 공간을 만들어보세요.",oneline:"스스로를 따뜻하게 감싸고 토닥이며, 온전히 나를 위로하는 시간이 필요해요!"},{id:5,name:"라임",en:"Lime",cat:"CITRUS",icon:"🍊",keyword:"상큼, 생기",target:"스트레스가 쌓일수록 모든 것이 더 무겁게 느껴지고 있지 않으신가요?",energy:"스트레스로 무거워진 마음을 가볍게 전환해 삶의 여유를 되찾게 해주는 에너지",story:"잠시 일에서 벗어나 시원한 라임 향기와 함께 심호흡을 해보세요. 다시 그 일을 바라보면 분명 이전보다 훨씬 가볍게 느껴질 거예요. 때론 삶의 무게를 잠시 내려놓고 느긋한 시간을 가져야 할 때도 있어요.",oneline:"긍정적이고 유연하게 상황에 대응하며 삶의 무게를 가볍게 내려놓으세요!"},{id:6,name:"레몬",en:"Lemon",cat:"CITRUS",icon:"🍊",keyword:"밝음, 집중",target:"과도한 감정이 올라올 때 정작 봐야 할 것들을 놓치고 있지 않으신가요?",energy:"격양된 감정을 가라앉히고 현재 상황을 이성적으로 바라보게 도와주는 에너지",story:"과도한 감정이 올라올 때 우리는 정작 봐야 할 것들을 놓치게 돼요. 그 감정에 휩쓸리기 전에 잠깐 멈추고 레몬의 맑고 프레쉬한 향기와 함께 스스로를 객관적으로 바라보세요. 감정을 식힌 후 다시 바라보면 훨씬 합리적인 판단을 할 수 있어요.",oneline:"과도한 감정은 잠시 내려놓고, 레몬의 청량함으로 마음을 맑고 차분하게 되돌려보세요!"},{id:7,name:"레몬그라스",en:"Lemongrass",cat:"LEAVES",icon:"🌿",keyword:"신선함, 힘",target:"반복되는 일상이 지루하고 무기력하게 느껴지고 있지 않으신가요?",energy:"고립된 사고와 환경에서 벗어나 내면의 자유와 사고의 확장을 이끌어주는 에너지",story:"반복되는 파도도 매 순간 다른 모습이에요. 스스로 가둔 생각과 환경에서 벗어나 호기심을 가지고 새로운 세상을 경험해 보세요. 마음이 해방될 때 비로소 진정으로 원하는 삶을 살 수 있어요.",oneline:"익숙하고 반복되는 지루함에서 마음을 해방시키고 즐거움이 넘치는 새로운 세상으로 나아가세요!"},{id:8,name:"로즈",en:"Rose",cat:"FLOWERS",icon:"🌸",keyword:"사랑, 위로",target:"관계에서 상처받고 마음이 닫혀가고 있지 않으신가요?",energy:"상처로 굳어진 마음을 녹여내어 사랑의 감정을 다시 흐르게 하는 치유의 에너지",story:"남을 미워하거나 관계를 포기하려는 마음은 당장은 편할 수 있지만 실제로 내 심장 에너지를 가장 약하게 만들어요. 지금 당장은 아니더라도 언젠가는 용서하고 사랑하는 감정을 가질 수 있을 거라는 생각만으로도 마음은 편안해질 수 있어요.",oneline:"상처받아 굳게 닫혀버린 마음에 사랑이라는 따뜨한 숨결을 불어 넣으세요!"},{id:9,name:"로즈마리",en:"Rosemary",cat:"LEAVES",icon:"🌿",keyword:"명확함, 기억",target:"새로운 무언가를 해보고 싶지만 머리가 꽉 막힌 느낌이 드시지 않으신가요?",energy:"막혀있던 사고를 깨워 창의적 에너지를 행동으로 구체화하도록 도와주는 에너지",story:"새로운 창조물이란 어느 날 갑자기 생겨나는 것이 아니에요. 다른 관점으로 바라본다면 분명 새로운 것을 찾아낼 수 있어요. 억압된 틀에서 벗어나 창의적인 생각들을 자유롭게 펼쳐보세요.",oneline:"억압된 틀을 깨버리고 신선하고 창의적인 생각들로 삶을 펼쳐나가세요!"},{id:10,name:"로즈우드",en:"Rosewood",cat:"WOODS",icon:"🪵",keyword:"따뜨함, 위로",target:"성장하기 위한 과정이 너무 버겁게 느껴지지 않으신가요?",energy:"현재 상황을 받아들여 더 단단하고 성숙한 나로 나아가게 하는 성장의 에너지",story:"성장하기 전에는 항상 숙제가 있게 마련이에요. 하지만 그 과정을 잘 해나간다면 분명 성장한 자신의 모습을 발견할 수 있어요. 마음을 열고 현재의 상황을 받아들이다 보면 더 단단하고 성숙한 내가 되어 있을 거예요.",oneline:"지금 겪는 성장통을 잘 견뎌내고 나면 한층 더 단단하고 성숙한 나를 마주하게 될 거예요!"},{id:11,name:"마조람",en:"Marjoram",cat:"LEAVES",icon:"🌿",keyword:"진정, 안식",target:"일어나지도 않은 일인데 걱정과 불안이 끊이질 않으신가요?",energy:"과도한 불안을 잠재우고 편안한 마음으로 이끌어주는 에너지",story:"내가 두려워하는 모든 일이 전부 일어나지는 않아요. 나의 상상이 걱정과 염려를 끝없이 확대시킬 때가 있어요. 심호흡을 천천히 해보세요. 막연한 걱정들이 별일이 아닌 것을 느낄 수 있어요.",oneline:"꼬리에 꼬리를 무는 불안은 내려놓고 편안한 마음으로 돌아오세요!"},{id:12,name:"만다린",en:"Mandarin",cat:"CITRUS",icon:"🍊",keyword:"부드러움, 기쁨",target:"당연하다고 생각한 기준에 맞지 않으면 이해할 수 없고 화가 나지 않으신가요?",energy:"나의 기준이 전부가 아닐 수 있음을 받아들여 마음이 가벼워지도록 돕는 에너지",story:"세상의 기준과 엄격함은 생각보다 주관적일 때가 많아요. 그런 세상을 내 기준으로만 재단하기보다 좀 더 큰 너그러움과 이해심을 가져보세요. 판단을 내려놓는 순간 마음이 가벼워지고 삶이 한층 즐거워질 거예요.",oneline:"나만의 판단 기준을 내려놓을 때 삶이 더 가볍고 자유로워져요!"},{id:13,name:"메이창",en:"May Chang",cat:"NUTS",icon:"🌿",keyword:"활력, 용기",target:"마주해야 할 상황만 떠올리면 자신도 모르게 위축되거나 도망가고 싶어지지 않으신가요?",energy:"움츠러드는 마음을 깨워 자신감과 확신을 가지고 당당히 나아가게 하는 에너지",story:"자신도 모르게 위축되어 도망가거나 숨고 싶을 때가 있어요. 하지만 위축된 모습으로 평생 살 수 없을 정도로 자신감 넘치는 삶을 원한다는 것을 누구보다 잘 알고 있잖아요. 지금 바로 그런 자신을 상상하면서 에너지를 전환해 보세요.",oneline:"내 안의 자신감을 끌어내 앞으로 당당하게 나아가세요!"},{id:14,name:"미르",en:"Myrrh",cat:"RESIN",icon:"🌕",keyword:"깊이, 성찰",target:"막연한 생각만 하다가 아무것도 시작하지 못하고 있지 않으신가요?",energy:"한 걸음씩 나아가며 꿈꿔왔던 이상을 현실화시키도록 도와주는 에너지",story:"너무 큰 꿈과 비전이 오히려 나를 좌절시킬 때가 있어요. 하지만 내가 그 비전을 품고 있다면 반드시 이뤄갈 수 있어요. 지금 당장 할 수 있는 것부터 하나씩 실행하는 단계가 필요해요.",oneline:"비전을 현실로 만드는 것은 지금 이 순간의 작은 한 걸음이에요!"},{id:15,name:"바질",en:"Basil",cat:"LEAVES",icon:"🌿",keyword:"명확함, 용기",target:"하고 싶은 말이 있는데 표현하지 못하고 꾹꾹 담아두고 있지 않으신가요?",energy:"하고 싶은 말을 명확하게 표현하도록 도와주는 에너지",story:"말하지 않으면 상대는 절대 알 수 없어요. 꾹꾹 담아두고 속상해하기보다 용기 내어 표현해 보세요. 처음엔 어색하고 두렵겠지만 한 번 해보면 생각보다 훨씬 가벼워지는 걸 느낄 수 있어요.",oneline:"말하지 않아도 알아주길 바라기보다 나의 목소리를 당당하게 내보세요!"},{id:16,name:"베르가못",en:"Bergamot",cat:"CITRUS",icon:"🍊",keyword:"밝음, 균형",target:"감정을 꾹꾹 눌러두다 보니 어느새 삶의 활력까지 사라지고 있지 않으신가요?",energy:"억눌린 감정을 해방시켜 삶에 열정과 기쁨을 되찾게 해주는 에너지",story:"감정을 계속 눌러 담다 보면 어느새 내가 무엇을 느끼는지조차 모르게 돼요. 억눌린 감정은 결국 예상치 못한 순간에 터져 나오기 마련이에요. 오늘 하루 느꼈던 감정을 솔직하게 꺼내보세요.",oneline:"억눌린 감정을 자유롭게 표현할 때 삶에 밝고 활기찬 에너지가 흐르기 시작해요!"},{id:17,name:"베티버",en:"Vetiver",cat:"ROOTS",icon:"🫚",keyword:"접지, 안정",target:"하루 종일 바쁘게 움직였는데 정작 무엇을 했는지 모르겠고 에너지만 소진된 느낌이 드시지 않으신가요?",energy:"흩어진 에너지에 안정감을 주어 중심을 잡도록 도와주는 에너지",story:"바쁘게 사는 것과 잘 사는 것은 달라요. 그라운딩이란 흩어진 나의 에너지를 땅처럼 단단한 곳으로 모아 중심을 잡는 것이에요. 잠시 멈추고 지금 내 에너지가 어디로 향하고 있는지 살펴보세요.",oneline:"감정적 에너지와 신체적 에너지를 모두 재충전해 균형 잡힌 삶으로 이끌어 나가세요!"},{id:18,name:"블랙페퍼",en:"Black Pepper",cat:"NUTS",icon:"🥜",keyword:"자극, 활력",target:"열심히 하고 있는 것 같은데 정작 내가 어디로 가고 있는지 모르겠다는 느낌이 드시지 않으신가요?",energy:"혼란스러운 마음에 방향성을 부여해 원하는 목표를 향하여 나아가게 하는 에너지",story:"방향 없이 열심히만 하면 에너지만 소진될 수 있어요. 지금 내가 가장 원하는 것이 무엇인지, 그것을 위해 지금 당장 무엇을 해야 하는지 한번 정리해보세요.",oneline:"삶의 목표와 방향을 정하고 망설임 없이 앞으로 나아가세요!"},{id:19,name:"사이프러스",en:"Cypress",cat:"LEAVES",icon:"🪵",keyword:"정화, 흐름",target:"이미 변화가 시작되었는데 그 변화를 받아들이지 못하고 저항하고 있지 않으신가요?",energy:"이미 온 변화와 다가오는 변화에 유연하게 맞추어 나갈 수 있도록 도와주는 에너지",story:"변화는 내가 원하든 원하지 않든 이미 시작되고 있어요. 이미 온 변화, 그리고 다가오는 변화를 유연하게 받아들이다 보면 오히려 그 안에서 새로운 가능성을 발견하게 될 거예요.",oneline:"변화를 유연하게 받아들이고 새로운 도전과 경험을 즐기세요!"},{id:20,name:"샌달우드",en:"Sandalwood",cat:"WOODS",icon:"🪵",keyword:"명상, 깊이",target:"주변 상황과 사람들에 치여 정작 내가 원하는 것이 무엇인지 잊어버리고 있지 않으신가요?",energy:"부산한 마음을 모아 내면에 집중할 수 있도록 도와주는 에너지",story:"답은 항상 내 안에 있어요. 하지만 바깥 세상의 소음에 치이다 보면 그 답을 듣지 못할 때가 많아요. 잠시 멈추고 조용히 나 자신에게 집중해보세요.",oneline:"나의 내면 깊숙이 들어가 본질을 파악하고 진정으로 하고자 하는 것을 찾아보세요!"},{id:21,name:"오렌지 스윗",en:"Sweet Orange",cat:"CITRUS",icon:"🍊",keyword:"따뜨함, 기쁨",target:"잘 해야만 한다는 생각에 너무 진지해져서 삶을 즐기지 못하고 있지 않으신가요?",energy:"완벽주의와 과도한 책임감을 내려놓고 가볍고 즐거운 에너지로 살아가도록 도와주는 에너지",story:"완벽하지 않아도 괜찮아요. 가볍게 생각하고 가볍게 행동해보세요. 마음이 가벼워질수록 오히려 더 좋은 결과가 따라올 때가 많아요. 지금 이 순간을 그냥 즐겨도 돼요.",oneline:"심각하고 진지한 틀에서 벗어나 가볍고 즐거운 삶의 여유를 느껴보세요!"},{id:22,name:"스위트펜넬",en:"Sweet Fennel",cat:"NUTS",icon:"🌿",keyword:"용기, 희망",target:"시작은 했는데 마무리를 짓지 못하고 질질 끌고 있지 않으신가요?",energy:"의기소침한 마음에 확신을 주어 끝까지 해낼 수 있도록 도와주는 에너지",story:"크고 거창한 것이 아니어도 괜찮아요. 작지만 확실하게 마무리하는 것, 그게 진짜 단호함이에요. 마침표 하나가 주는 힘은 생각보다 커요.",oneline:"작지만 확실한 마침표 하나가 나를 더 단단하고 강인하게 만들어줘요!"},{id:23,name:"스피어민트",en:"Spearmint",cat:"LEAVES",icon:"🌿",keyword:"상큼, 활력",target:"책임감 때문에 삶의 무게가 점점 버거워지고 있지 않으신가요?",energy:"책임감의 무게를 덜어내어 상쾌한 감정과 활력을 깨워주는 에너지",story:"책임감이 강한 건 좋은 일이에요. 하지만 그 책임감이 점점 쌓이다 보면 어느새 삶 자체가 무거워지기 시작해요. 잠시 그 무게를 내려놓고 가벼워진 나를 느껴보세요.",oneline:"삶의 무게를 가볍게 내려놓고 활력 에너지로 가득 찬 자신의 모습을 되찾으세요!"},{id:24,name:"시나몬",en:"Cinnamon",cat:"LEAVES",icon:"🌕",keyword:"따뜻함, 연결",target:"솔직하게 말하기보다 듣기 좋은 말로 포장하다 보니 정작 내 진심이 전달되지 않아 답답하지 않으신가요?",energy:"솔직한 감정을 드러내어 삶의 따뜨함과 열정을 회복하게 하는 에너지",story:"상대가 듣기 좋은 말로 포장하다 보면 어느새 내 진심과 멀어지게 돼요. 솔직하게 표현하는 것이 때론 불편할 수 있지만 진심이 담긴 말 한마디가 오히려 관계를 더 따뜻하게 만들어줘요.",oneline:"솔직하고 진정성 있는 모습으로 자신의 감정을 표현해보세요!"},{id:25,name:"시더우드",en:"Cedarwood",cat:"WOODS",icon:"🪵",keyword:"안정, 강함",target:"힘들고 어려운 시기를 버티면서 용기와 의지가 점점 사라지고 있지 않으신가요?",energy:"두려움에 흔들리지 않는 힘과 용기를 주어 내면의 강인함을 찾게 하는 에너지",story:"버티는 것만으로도 충분히 잘하고 있는 거예요. 힘든 시간이 길어질수록 내가 약해지는 것 같은 느낌이 들 수 있어요. 하지만 그 시간을 견디는 것 자체가 이미 힘과 용기예요.",oneline:"인내와 지혜로 잘 견뎌내면 분명 웃을 수 있는 날이 올 거예요!"},{id:26,name:"유칼립투스",en:"Eucalyptus",cat:"LEAVES",icon:"🌿",keyword:"명확함, 호흡",target:"새로운 도전 앞에서 복잡한 생각들이 머릿속을 가득 채워 정작 앞으로 나아가지 못하고 있지 않으신가요?",energy:"복잡한 생각을 정리하여 두려움 없이 도전할 수 있도록 시야를 열어주는 에너지",story:"도전 앞에서 복잡한 생각들이 쏟아지는 건 자연스러운 일이에요. 하지만 그 생각들에 갇혀 있다 보면 정작 시작조차 못하게 돼요. 생각을 정리하고 나면 두려움도 함께 정리돼요.",oneline:"도전을 기꺼이 즐기면서 삶의 자신감을 찾아보세요!"},{id:27,name:"일랑일랑",en:"Ylang Ylang",cat:"FLOWERS",icon:"🌸",keyword:"평온, 신뢰",target:"내 뜻대로 되지 않아 조급하고 짜증이 많아지면서 마음이 자꾸 흔들리고 있지 않으신가요?",energy:"조급함과 짜증을 가라앉혀 내면의 고요한 마음을 되찾게 해주는 에너지",story:"내 뜻대로 되지 않을 때 올라오는 조급함과 짜증, 누구나 느끼는 감정이에요. 하지만 그 감정에 휩쓸리다 보면 정작 중요한 것들을 놓치게 돼요. 잠시 멈추고 깊게 숨을 쉬어보세요.",oneline:"조급함과 짜증을 내려놓고 고요한 마음을 되찾으세요!"},{id:28,name:"자스민",en:"Jasmine",cat:"FLOWERS",icon:"🌸",keyword:"용기, 희망",target:"과거에 대한 후회나 미래에 대한 불안으로 정작 지금 이 순간에 집중하지 못하고 있지 않으신가요?",energy:"지금 이 순간에 온전히 존재할 수 있도록 해주는 에너지",story:"후회하면 현재에 집중하지 못하게 돼요. 지금의 현재도 곧 과거로 남는데 계속 후회만 하고 싶지는 않을 거예요. 불안의 허상을 떨치고 지금 이 순간에 집중하면 불안했던 미래도 안정되어 가요.",oneline:"어제의 후회, 내일의 불안에서 벗어나 오로지 이 순간을 살아가세요!"},{id:29,name:"저먼 카모마일",en:"German Chamomile",cat:"FLOWERS",icon:"🌸",keyword:"진정, 안정",target:"예상치 못한 일이 생기면 괜히 마음이 불편해지고, 쉽게 놓아주기 어려우신가요?",energy:"예측할 수 없는 것들에 대한 긴장을 내려놓고, 흐름을 믿을 수 있도록 도와주는 에너지",story:"모든 일이 내 뜻대로 되지 않아도 괜찮아요. 흐름에 맡기는 것도 용기예요.",oneline:"내 뜻대로 되지 않아도, 결국 잘 흘러갈 거예요!"},{id:30,name:"제라늄 로즈",en:"Geranium Rose",cat:"LEAVES",icon:"🌸",keyword:"균형, 조화",target:"세세한 것 하나까지 완벽하게 하려다가 정작 중요한 것을 놓치고 있지 않으신가요?",energy:"완벽에 대한 강박을 내려놓고 마음의 균형을 되찾을 수 있도록 도와주는 에너지",story:"작은 것에 너무 집착할수록 중요한 것을 놓칠 수 있어요. 완벽한 상황을 만들기 위해 불필요한 에너지를 쏟기보다 심적으로 안정된 상태에서 일할 때 오히려 더 좋은 결과가 나와요.",oneline:"완벽에서 벗어나 균형 잡힌 마음이 오히려 더 좋은 결과를 만들어줄 거예요!"},{id:31,name:"주니퍼베리",en:"Juniper Berry",cat:"NUTS",icon:"🥜",keyword:"정화, 명확",target:"새로운 일들을 준비해야 하는데 머릿속이 너무 복잡하고 불필요한 생각들로 가득 차 있지 않으신가요?",energy:"불필요한 생각을 비우고 새로운 변화를 준비하게 하는 맑은 정화의 에너지",story:"완벽한 준비란 없어요. 지금 내 머릿속에 가득 찬 불필요한 생각들을 먼저 비워보세요. 생각이 맑아질수록 진짜 필요한 것이 보이기 시작해요.",oneline:"생각을 비우고 맑아진 마음으로 새로운 변화를 기꺼이 받아들이세요!"},{id:32,name:"진저",en:"Ginger",cat:"ROOTS",icon:"🌕",keyword:"따뜨함, 활력",target:"해야 할 일을 알면서도 자꾸 미루게 되고 정작 시작하지 못하고 있지 않으신가요?",energy:"내 안의 에너지를 깨워 모든 일을 힘 있게 실행할 수 있도록 도와주는 에너지",story:"미루고 있다와 행동한다 사이에는 아주 큰 간극이 있어요. 하지만 그 간극을 채울 수 있는 사람은 바로 나 자신이에요. 완벽하지 않아도 괜찮아요. 일단 시작해보세요.",oneline:"지금 바로 행동하세요, 그 순간 비로소 내 안의 강력한 에너지가 깨어나요!"},{id:33,name:"클라리세이지",en:"Clary Sage",cat:"LEAVES",icon:"🌿",keyword:"명확함, 이완",target:"감정이 복잡하고 혼란스러워서 무엇을 느끼는지조차 모르겠고 그 혼란이 우울함으로 이어지고 있지 않으신가요?",energy:"혼란스러움을 해소하여 진정으로 원하는 것을 명료하게 바라보게 하는 에너지",story:"감정이 뒤엉켜 혼란스러울 때 우울함이 찾아오기 쉬워요. 내가 지금 어떤 감정인지조차 모를 때 삶 전체가 흐릿하게 느껴져요. 잠시 멈추고 지금 내가 느끼는 감정을 하나씩 들여다보세요.",oneline:"감정이 명료해지는 순간 삶의 방향도 선명하게 보이기 시작해요!"},{id:34,name:"클로브",en:"Clove",cat:"FLOWERS",icon:"🌕",keyword:"온기, 자극",target:"감당하기 어려운 것을 놓지 못하고 계속 붙잡고 있지 않으신가요?",energy:"소화할 수 없는 것들을 내려놓아 더 큰 가능성을 탐색할 수 있도록 돕는 에너지",story:"꽉 쥐고 있으면 안전할 것 같지만 사실 그 무게가 나를 더 힘들게 하고 있어요. 내가 감당할 수 있는 것과 없는 것을 구분하는 것도 용기예요. 손을 펼치는 순간 더 크고 새로운 것들이 들어올 공간이 생겨요.",oneline:"용기 있게 내려놓는 순간 더 크고 새로운 가능성이 찾아와요!"},{id:35,name:"타임",en:"Thyme",cat:"LEAVES",icon:"🌿",keyword:"힘, 용기",target:"힘든 상황이 계속되면서 나도 모르게 의지와 자신감이 흔들리고 있지 않으신가요?",energy:"힘든 상황에서도 내면의 의지를 깨워 스스로에게 강한 힘을 주는 에너지",story:"지금 이 힘든 시간이 영원할 것 같지만 그렇지 않아요. 여기까지 버텨온 것만으로도 이미 충분히 강한 사람이에요. 흔들릴 때마다 나를 여기까지 오게 한 힘이 무엇인지 떠올려보세요.",oneline:"여기까지 버텨온 것만으로도 이미 충분히 강한 사람이에요!"},{id:36,name:"티트리",en:"Tea Tree",cat:"LEAVES",icon:"🌿",keyword:"정화, 명확",target:"예상치 못한 일들이 연속으로 일어나 혼란스럽고 당황스러운 상황에 처해 있지 않으신가요?",energy:"혼란스러 let currentPage = 0;

let currentCategory = null;

// === TAB SWITCHING ===
document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='recommend') goToPage(0);
    if(tab.dataset.tab==='gallery'){renderCatScroll();filterGallery();}
  });
});

// === PAGE NAVIGATION ===
function goToPage(n){
  document.getElementById('page0').classList.remove('visible');
  document.getElementById('page1').classList.remove('visible');
  document.getElementById('page'+n).classList.add('visible');
  currentPage = n;
  if(n===1){ document.getElementById('chatArea').scrollTop=0; }
  if(n===0){
    document.getElementById('chatArea').innerHTML='';
    document.getElementById('chatBottom').style.display='none';
    currentCategory=null;
  }
}

// === BIG CATEGORY GRID ===
document.getElementById('bigCatGrid').innerHTML = categoryData.map(cat => `
  <div class="big-cat-card" onclick="selectCategory('${cat.id}')">
    <span class="big-cat-label" style="padding-top:${cat.labelHtml.includes('<br>')?'4':'16'}px">${cat.labelHtml||cat.label}</span>
    <span class="big-cat-sub">${cat.enSub||''}</span>
  </div>
`).join('');

// === SELECT BIG CATEGORY → GO TO CHATBOT ===
function selectCategory(catId) {
  const cat = categoryData.find(c => c.id === catId);
  currentCategory = cat;
  chatArea.innerHTML='';
  document.getElementById('chatBottom').style.display='none';
  goToPage(1);

  setTimeout(async () => {
    addTyping();
    await new Promise(r=>setTimeout(r,1000));
    removeTyping();
    await addBotMsg(cat.greeting);

    addTyping();
    await new Promise(r=>setTimeout(r,800));
    removeTyping();

    if(cat.hasSub){
      const subHtml = cat.subs.map((s,i) =>
        `<button class="follow-btn" onclick="showSubOptions('${catId}',${i})"><span class="follow-btn-dot"></span>${s.subLabel}</button>`
      ).join('');
      await addBotMsg(`${cat.question}<div class="follow-options">${subHtml}</div>`);
    } else {
      const optHtml = cat.options.map(o =>
        `<button class="follow-btn" onclick="selectOil(${o.oilId})"><span class="follow-btn-dot"></span>${o.text}</button>`
      ).join('');
      await addBotMsg(`${cat.question}<div class="follow-options">${optHtml}</div>`);
    }
  }, 400);
}

async function showSubOptions(catId, subIdx) {
  const cat = categoryData.find(c => c.id === catId);
  const sub = cat.subs[subIdx];
  const optBtns = document.querySelectorAll('.follow-btn');
  optBtns.forEach(b=>b.disabled=true);

  addTyping();
  await new Promise(r=>setTimeout(r,800));
  removeTyping();

  const optHtml = sub.subOptions.map(o =>
    `<button class="follow-btn" onclick="selectOil(${o.oilId})"><span class="follow-btn-dot"></span>${o.text}</button>`
  ).join('');
  await addBotMsg(`조금 더 구체적으로 어떤 느낌이세요?<div class="follow-options">${optHtml}</div>`);
}

// === CHAT ENGINE ===
const chatArea = document.getElementById('chatArea');

function addBotMsg(html,delay=0){
  return new Promise(r=>{setTimeout(()=>{
    const div=document.createElement('div');
    div.className='chat-msg bot-msg';
    div.innerHTML=html;
    chatArea.appendChild(div);
    chatArea.scrollTop=chatArea.scrollHeight;
    r();
  },delay);});
}

function addTyping(){
  const div=document.createElement('div');
  div.className='chat-msg bot-msg typing-indicator';
  div.innerHTML='<span></span><span></span><span></span>';
  chatArea.appendChild(div);
  chatArea.scrollTop=chatArea.scrollHeight;
}

function removeTyping(){
  const t=chatArea.querySelector('.typing-indicator');
  if(t)t.remove();
}

async function selectOil(oilId){
  const oil = allOils.find(o => o.id === oilId);
  if(!oil)return;

  const optBtns = document.querySelectorAll('.follow-btn');
  optBtns.forEach(b=>b.disabled=true);

  const userMsgDiv = document.createElement('div');
  userMsgDiv.className = 'chat-msg user-msg';
  userMsgDiv.innerHTML = `<span class="user-msg-text">${oil.name}</span>`;
  chatArea.appendChild(userMsgDiv);
  chatArea.scrollTop=chatArea.scrollHeight;

  addTyping();
  await new Promise(r=>setTimeout(r,1000));
  removeTyping();

  await addBotMsg(`그런 마음이시군요.<br>당신을 위한 오일을 찾았어요. ✨`);

  addTyping();
  await new Promise(r=>setTimeout(r,1000));
  removeTyping();
  await addBotMsg(buildOilCard(oil));

  // 오일 카드 메시지 저장
  const oilCardMsg = chatArea.lastElementChild;

  addTyping();
  await new Promise(r=>setTimeout(r,800));
  removeTyping();
  await addBotMsg('이 향기와 함께 마음을 돌보는<br>시간을 가져보세요 ☺️');

  // 함께 쓰면 좋은 오일 추천
  const compCard=buildCompanionCard(oil);
  if(compCard){
    addTyping();
    await new Promise(r=>setTimeout(r,600));
    removeTyping();
    await addBotMsg(compCard);
  }

  document.getElementById('chatBottom').style.display='block';

  // 모든 메시지 추가 완료 후 오일 카드 상단으로 스크롤
  await new Promise(r=>setTimeout(r,150));
  if(oilCardMsg) oilCardMsg.scrollIntoView({behavior:'smooth',block:'start'});
}

function buildOilCard(oil){
  return `<div class="oil-card-wrap"><div class="oil-card">
    <div class="oil-card-head">
      <div class="oil-card-icon">${oil.icon}</div>
      <div><div class="oil-card-name">${oil.name}</div>
      <div class="oil-card-en">${oil.en}</div></div>
    </div>
    <span class="oil-card-keyword">${oil.keyword}</span>
    <div class="oil-card-label">당신에게 묻고 싶어요</div>
    <div class="oil-card-text">${oil.target}</div>
    <div class="oil-card-divider"></div>
    <div class="oil-card-label">이 오일의 에너지</div>
    <div class="oil-card-text">${oil.energy}</div>
    <div class="oil-card-divider"></div>
    <div class="oil-card-label">마음 이야기</div>
    <div class="oil-card-text">${oil.story}</div>
    <div class="oil-card-quote">${oil.oneline}</div>
    <a class="btn-buy" onclick="alert('쇼핑몰 준비 중입니다 :)')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      구매하기
    </a>
  </div></div>`;
}

function buildCompanionCard(oil){
  const ids=companionOils[oil.id]||[];
  if(!ids.length)return '';
  const cards=ids.map(cid=>{
    const c=allOils.find(o=>o.id===cid);
    if(!c)return '';
    return `<div class="companion-card" onclick="openModal(${c.id})">
      <div class="companion-icon">${c.icon}</div>
      <div class="companion-info">
        <div class="companion-name">${c.name}</div>
        <div class="companion-en">${c.en}</div>
        <div class="companion-keyword">${c.keyword}</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--sage-400)" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    </div>`;
  }).join('');
  return `<div class="companion-wrap">
    <div class="companion-title">🌿 함께 쓰면 좋은 오일</div>
    <div class="companion-cards">${cards}</div>
  </div>`;
}

// === GALLERY ===
function renderCatScroll(){
  document.getElementById('catScroll').innerHTML=categories.map(cat=>{
    const icon=cat==="전체"?"✨":catIcons[cat];
    return `<button class="cat-chip ${cat===currentCat?'active':''}" onclick="filterCat('${cat}')">${icon} ${cat==="전체"?"전체":cat}</button>`;
  }).join('');
}
function filterCat(cat){currentCat=cat;renderCatScroll();filterGallery();}
function filterGallery(){
  const s=document.getElementById('searchInput').value.toLowerCase().trim();
  let f=allOils;
  if(currentCat!=="전체")f=f.filter(o=>o.cat===currentCat);
  if(s)f=f.filter(o=>o.name.toLowerCase().includes(s)||o.en.toLowerCase().includes(s)||o.keyword.toLowerCase().includes(s));
  renderOilList(f);
}
function renderOilList(list){
  const ol=document.getElementById('oilList'),nr=document.getElementById('noResults');
  if(!list.length){ol.innerHTML='';nr.style.display='block';return;}
  nr.style.display='none';
  ol.innerHTML=list.map(oil=>`
    <div class="oil-item" onclick="openModal(${oil.id})">
      <div class="oil-item-icon">${oil.icon}</div>
      <div class="oil-item-info"><div class="oil-item-name">${oil.name}</div><div class="oil-item-en">${oil.en}</div><span class="oil-item-keyword">${oil.keyword}</span></div>
      <svg class="oil-item-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    </div>`).join('');
}
function openModal(id){
  const oil=allOils.find(o=>o.id===id);if(!oil)return;
  document.getElementById('modalContent').innerHTML=`
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">&times;</button>
    ${buildOilCard(oil).replace('oil-card-wrap','').replace('oil-card','oil-card" style="border:none;box-shadow:none;padding:0')}`;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modalOverlay').classList.remove('show');});

// INIT
renderCatScroll();
renderOilList(allOils);
</script>
